services:
  postgres:
    image: postgres:17
    container_name: zt-postgres
    env_file:
      - ../../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:8-alpine
    container_name: zt-redis
    ports:
      - "6379:6379"
    volumes:
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf

  minio:
    image: minio/minio
    container_name: zt-minio
    env_file:
      - ../../.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  gateway-api:
    build: ../../apps/gateway-api
    env_file:
      - ../../.env
    container_name: zt-gateway
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  auth-service:
    build: ../../apps/auth-service
    env_file:
      - ../../.env
    container_name: zt-auth
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis

  policy-service:
    build: ../../apps/policy-service
    env_file:
      - ../../.env
    container_name: zt-policy
    ports:
      - "8002:8000"

  file-service:
    build: ../../apps/file-service
    env_file:
      - ../../.env
    container_name: zt-file
    ports:
      - "8003:8000"
    depends_on:
      - minio
      - postgres

  audit-service:
    build: ../../apps/audit-service
    env_file:
      - ../../.env
    container_name: zt-audit
    ports:
      - "8004:8000"
    depends_on:
      - postgres

  risk-service:
    build: ../../apps/risk-service
    env_file:
      - ../../.env
    container_name: zt-risk
    ports:
      - "8005:8000"
    depends_on:
      - redis
      - postgres

  worker-service:
    build: ../../apps/worker-service
    env_file:
      - ../../.env
    container_name: zt-worker
    depends_on:
      - redis
      - minio
      - postgres

  frontend:
    build: ../../apps/frontend
    env_file:
      - ../../.env
    container_name: zt-frontend
    ports:
      - "5173:5173"
    depends_on:
      - gateway-api

volumes:
  postgres_data:
  minio_data: