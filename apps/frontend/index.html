<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZT-SDX · Enterprise Data Exchange</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/pages.css"/>
</head>
<body class="theme-dark">

  <!-- =============================== -->
  <!-- LAYOUT 1: PUBLIC (Landing, Login) -->
  <!-- =============================== -->
  <div id="layout-public" class="layout-container" style="display:none;">
    <div id="view-public"></div>
  </div>

  <!-- =============================== -->
  <!-- LAYOUT 2: WIZARD (Onboarding)   -->
  <!-- =============================== -->
  <div id="layout-wizard" class="layout-container" style="display:none;">
    <div class="wizard-header">
      <div class="brand">ZT-SDX <span>Enterprise</span></div>
      <div class="wizard-exit"><a href="#login">Exit Setup</a></div>
    </div>
    <div id="view-wizard" class="wizard-body"></div>
  </div>

  <!-- =============================== -->
  <!-- LAYOUT 3: DASHBOARD (Protected) -->
  <!-- =============================== -->
  <div id="layout-dashboard" class="layout-container app-layout" style="display:none;">
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h2>ZT-SDX</h2>
        <span>Enterprise Platform</span>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Rendered dynamically based on Role -->
      </nav>
      <div class="sidebar-footer">
        <button id="theme-toggle" class="btn-ghost" style="width:100%;text-align:left;padding:8px">🌙 Toggle Theme</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-area">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <h2 id="topbar-title">Dashboard</h2>
        </div>
        <div class="topbar-right">
          <div class="trust-indicator" id="trust-indicator">
            <span class="dot"></span> Trust Score: <strong id="trust-score">--</strong>
          </div>
          <button class="icon-btn">🔔</button>
          <div class="user-dropdown">
            <div class="avatar" id="user-avatar">?</div>
            <div class="user-meta">
              <div class="name" id="user-name">Loading...</div>
              <div class="role" id="user-role">Loading...</div>
            </div>
          </div>
          <button id="logout-btn" class="icon-btn" title="Sign Out">⏻</button>
        </div>
      </header>

      <!-- Dynamic Page Content injects here -->
      <div id="view-dashboard" class="page-container"></div>
    </main>
  </div>

  <!-- Global Toast / Modal Shells -->
  <div id="toast-container"></div>
  <div id="modal-container" class="modal-overlay" style="display:none;">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Scripts -->
  <script src="js/mockData.js"></script>
  <script src="js/components.js"></script>
  <script src="js/api.js"></script>
  
  <!-- Page Renderers -->
  <script src="js/pages/home.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/signup.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/files.js"></script>
  <script src="js/pages/upload.js"></script>
  <script src="js/pages/shares.js"></script>
  <script src="js/pages/alerts.js"></script>
  <script src="js/pages/audit.js"></script>
  <script src="js/pages/policies.js"></script>
  <script src="js/pages/admin-users.js"></script>
  <script src="js/pages/admin-org.js"></script>
  <script src="js/pages/analytics.js"></script>
  <!-- Other page scripts will be added here as we build them -->

  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
